<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card to GameDoctor Convertor (Dual-Mode Dual-Group V6.3)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --glow-color: #00ff33;
            --glow-spread: 15px;
            --bg-dark: #08080a;
            --panel-bg: rgba(18, 18, 24, 0.75);
            --border-color: rgba(0, 255, 51, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background 1s ease;
        }
        
        /* 初始狀態完全隱藏背景圖，成功時才透過 JS 加載並淡入 */
        body.success-mode {
            background-image: url(https://systemmum.github.io/MagicCard2Doctor/MD2GD_bg.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #effectCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* 可隱藏的控制台主 UI 包裹層 */
        #mainUiWrapper {
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: scale(1);
        }
        body.success-mode #mainUiWrapper {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
            display: none; /* 轉換成功後全面蒸發 */
        }

        .build-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #666666;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #222222;
            letter-spacing: 0.5px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .upload-box {
            border: 2px dashed rgba(0, 255, 51, 0.3);
            border-radius: 12px;
            padding: 45px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            overflow: hidden;
        }
        .upload-box:hover {
            background: rgba(0, 255, 51, 0.03);
            border-color: #00ff33;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.1);
            transform: translateY(-2px);
        }
        #fileInput {
            display: none;
        }
        
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 51, 0.05);
            border-left: 4px solid #00ff33;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        
        .patch-control-panel {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .patch-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            user-select: none;
            width: 100%;
            color: #dddddd;
        }
        /* 美化為科技感 Toggle Switch */
        .switch-wrapper {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
            margin-right: 12px;
        }
        .patch-checkbox {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333333;
            transition: .3s;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: #888888;
            transition: .3s;
            border-radius: 50%;
        }
        .patch-checkbox:checked + .slider {
            background-color: rgba(0, 255, 51, 0.2);
            border-color: #00ff33;
        }
        .patch-checkbox:checked + .slider:before {
            transform: translateX(18px);
            background-color: #00ff33;
            box-shadow: 0 0 8px #00ff33;
        }
        .patch-desc {
            font-size: 13px;
            color: #888888;
            font-weight: normal;
            margin-left: 8px;
        }

        .info-panel {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: none;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            font-size: 14px;
            margin-top: 12px;
        }
        .info-item {
            background: rgba(10, 10, 12, 0.8);
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-label {
            color: #888888;
        }
        .info-value {
            font-weight: 600;
            color: #ffffff;
            font-family: monospace;
        }
        
        .alert-badge {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            display: none;
            line-height: 1.4;
        }
        .badge-success {
            background-color: rgba(0, 255, 51, 0.06);
            color: #00ff33;
            border: 1px solid rgba(0, 255, 51, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.05);
        }
        .badge-danger {
            background-color: rgba(255, 0, 85, 0.06);
            color: #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.2);
        }
        
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }
        button {
            background-color: rgba(255, 255, 255, 0.03);
            color: #555555;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px 40px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            letter-spacing: 0.5px;
        }
        button:not(:disabled) {
            background: linear-gradient(135deg, #00ff33 0%, #00aa22 100%);
            color: #000000;
            border: none;
            box-shadow: 0 4px 20px rgba(0,255,51,0.25);
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,255,51,0.45);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            cursor: not-allowed;
        }
        
        .log-box {
            margin-top: 25px;
            background: #040405;
            color: #00ff33;
            padding: 18px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 51, 0.1);
            display: none;
            white-space: pre-wrap;
            word-break: break-all;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }

        /* ==================== 🌟 巨型成功面板 🌟 ==================== */
        #successScreen {
            display: none;
            opacity: 0;
            transform: scale(0.85);
            text-align: center;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid rgba(0, 255, 51, 0.4);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 255, 51, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #successScreen.show {
            display: block;
            opacity: 1;
            transform: scale(1);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 51, 0.1);
            border: 2px solid #00ff33;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.3);
            animation: pulseGlow 2s infinite alternate;
        }
        .huge-success-title {
            font-size: 48px;
            font-weight: 900;
            color: #ffffff;
            margin: 0 0 15px 0;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 255, 51, 0.6), 0 0 30px rgba(0, 255, 51, 0.2);
            background: linear-gradient(to right, #ffffff 30%, #00ff33 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .success-subtitle {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .btn-restart {
            background: transparent;
            color: #00ff33;
            border: 1px solid rgba(0, 255, 51, 0.4);
            padding: 10px 25px;
            font-size: 13px;
            border-radius: 6px;
            box-shadow: none;
        }
        .btn-restart:hover {
            background: rgba(0, 255, 51, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.2);
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(0, 255, 51, 0.2); border-color: rgba(0, 255, 51, 0.6); }
            100% { box-shadow: 0 0 30px rgba(0, 255, 51, 0.5); border-color: #00ff33; }
        }
    </style>
</head>
<body>

    <canvas id="effectCanvas"></canvas>
    <div class="build-badge">Build: 20260702_2130_MC_V6.3_DUALMODE</div>

    <!-- 🌐 核心主 UI 控制台 包裹層 -->
    <div id="mainUiWrapper">
        <h1>Magic Card to GameDoctor Convertor</h1>

        <div class="container">
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="#00ff33" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p style="font-size: 15px; margin-top: 15px; font-weight: 600; letter-spacing: 0.5px;">點擊此處或拖曳 .mc 檔案到這裡</p>
                <span style="color: #666666; font-size: 12px;">(支援 40200h 常規與 40400h 防拷雙模封裝)</span>
                <input type="file" id="fileInput" accept=".mc">
            </div>

            <div class="patch-control-panel">
                <label class="patch-label">
                    <span class="switch-wrapper">
                        <input type="checkbox" id="greyScreenPatchCheck" class="patch-checkbox">
                        <span class="slider"></span>
                    </span>
                    <span>啟用灰色畫面相容性修正</span>
                    <span class="patch-desc">(將 Disk A 的位址 55h 強制修改為 40h，防止實機卡灰屏)</span>
                </label>
            </div>

            <div id="fileInfo" class="file-info"></div>

            <div id="infoPanel" class="info-panel">
                <div style="font-weight: bold; color: #00ff33; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; font-size: 14px;" id="panelTitle">🔍 Magic Card 硬體指紋安全審查：</div>
                <div class="info-grid">
                    <div class="info-item"><span class="info-label">檔案總容量</span><span id="vFileSize" class="info-value">-</span></div>
                    <div class="info-item"><span class="info-label">容量合法性</span><span id="vSizeStatus" class="info-value">-</span></div>
                    <div class="info-item"><span class="info-label">零區特徵區段</span><span id="vPaddingLabel" class="info-value">0x10 - 0x1FF</span></div>
                    <div class="info-item"><span class="info-label">零區驗證結果</span><span id="vZeroStatus" class="info-value">-</span></div>
                </div>
                <div id="alertBadge" class="alert-badge"></div>
            </div>

            <div class="btn-container">
                <button id="convertBtn" disabled>等待讀取檔案...</button>
            </div>

            <div id="logBox" class="log-box"></div>
        </div>
    </div>

    <!-- 🌟 巨型成功慶祝儀式面板 -->
    <div id="successScreen">
        <div class="success-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ff33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h2 class="huge-success-title">轉換成功</h2>
        <p class="success-subtitle">實機特徵校準與雙區塊分組物理映射組裝竣工！已成功導出 4 片精確大小的磁碟包！</p>
        <button class="btn-restart" onclick="window.location.reload()">轉換新檔案</button>
    </div>

    <script>
        function log(message) {
            const logBox = document.getElementById('logBox');
            logBox.style.display = 'block';
            logBox.innerHTML += message + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        let mcBuffer = null;
        let originalFileName = "game";
        
        const SIZE_40200 = 0x40200; 
        const SIZE_40400 = 0x40400; 
        let currentFileMode = null; 

        // ==================== [ ⚙️ Canvas 視覺動畫核心 ] ====================
        const canvas = document.getElementById('effectCanvas');
        const ctx = canvas.getContext('2d');
        let animationMode = 'idle'; // idle (掃描線) | quantum (成功爆破) | glitch (錯誤數據雨)
        let particles = [];
        let scanLines = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 初始化背景微弱掃描線與浮游微粒
        function initIdleEffects() {
            scanLines = [];
            particles = [];
            for(let i=0; i<3; i++) {
                scanLines.push({ y: Math.random() * canvas.height, speed: Math.random() * 0.5 + 0.2, opacity: Math.random() * 0.08 + 0.02 });
            }
            for(let i=0; i<25; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.3 + 0.1
                });
            }
        }
        initIdleEffects();

        function startQuantumBurst() {
            animationMode = 'quantum';
            particles = [];
            log("🎆 <span style='color:#00ff33;'><b>[視覺核心]</b>：切換至終極量子爆破慶祝動畫層。</span>");
            // 爆發出大量帶有尾跡的高級微粒
            for (let i = 0; i < 150; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 2;
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.01 + 0.005,
                    color: `hsl(${Math.random() * 40 + 110}, 100%, 60%)` // 偏向薄荷綠與螢光綠的霓虹色
                });
            }
        }

        function startGlitchRain() {
            animationMode = 'glitch';
            particles = []; // 拿來當亂碼雨滴使用
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 15 + 8,
                    speed: Math.random() * 15 + 10,
                    weight: Math.random() * 2 + 0.5,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
            log("🌧️ <span style='color:#ff0055;'><b>[視覺核心]</b>：安全特徵異常，切換至雷達故障雜訊電流層。</span>");
        }

        function loopEffects() {
            requestAnimationFrame(loopEffects);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (animationMode === 'idle') {
                // 1. 繪製微弱的橫向掃描軌道線
                ctx.strokeStyle = 'rgba(0, 255, 51, 1)';
                for(let i=0; i<scanLines.length; i++) {
                    let s = scanLines[i];
                    ctx.save();
                    ctx.globalAlpha = 0.2;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, s.y);
                    ctx.lineTo(canvas.width, s.y);
                    ctx.stroke();
                    ctx.restore();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                }
                // 2. 輕量浮游微粒
                for(let i=0; i<particles.length; i++) {
                    let p = particles[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 51, 1)`;
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                }
            } 
            else if (animationMode === 'quantum') {
                // 成功：高質感量子爆破
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98; // 輕微空氣阻力
                    p.vy *= 0.98;
                    p.vy += 0.02; // 微弱重力下墜
                    p.alpha -= p.decay;

                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }

                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();
                }
                // 持續在中央補上一點點微弱的散射微粒
                if(Math.random() < 0.3 && particles.length < 200) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 3 + 1;
                    particles.push({
                        x: canvas.width / 2,
                        y: canvas.height / 2,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: Math.random() * 2 + 0.5,
                        alpha: 1,
                        decay: 0.02,
                        color: '#00ff33'
                    });
                }
            } 
            else if (animationMode === 'glitch') {
                // 失敗：霓虹紅色的故障電流數據雨
                ctx.strokeStyle = '#ff0055';
                for (let i = 0; i < particles.length; i++) {
                    let r = particles[i];
                    ctx.save();
                    ctx.globalAlpha = r.opacity;
                    ctx.lineWidth = r.weight;
                    ctx.beginPath();
                    ctx.moveTo(r.x, r.y);
                    ctx.lineTo(r.x + (Math.random() - 0.5) * 4, r.y + r.length); // 帶有些微橫向抖動
                    ctx.stroke();
                    ctx.restore();
                    
                    r.y += r.speed;
                    if (r.y > canvas.height) {
                        r.y = -r.length;
                        r.x = Math.random() * canvas.width;
                    }
                }
            }
        }
        loopEffects();

        // ==================== [ 🛠️ 數據配置區 (100% 保留原本二進位常數) ] ====================
        const block_headers_40200h = [
            [	0x00, 0x00, 0x83, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 0x43, 0x2A, 0xFF, 0x42,
				0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x0F, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x77, 0x01, 0x27, 0x49, 0x61, 0x00, 
				0x00, 0x02, 0x00, 0x45, 0x00, 0x43, 0x00, 0x77, 0x02, 0x05, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF, 0x00, 0x00, 0x00, 0x03, 0x00, 
				0x00, 0x02, 0x03, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 
				0x00, 0x00, 0x00, 0x04, 0x80, 0x20, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52,

            document.body.classList.remove('success-mode');
            document.getElementById('successScreen').classList.remove('show');
            initIdleEffects(); // 回復掃描線

            reader.onload = function(event) {
                mcBuffer = event.target.result;
                const mcData = new Uint8Array(mcBuffer);
                const actualSize = mcData.length;

                let isSizeValid = false;
                if (actualSize === SIZE_40200) {
                    isSizeValid = true;
                    currentFileMode = '40200h';
                    document.getElementById('vSizeStatus').innerText = "OK (符合常規 0x40200)";
                } else if (actualSize === SIZE_40400) {
                    isSizeValid = true;
                    currentFileMode = '40400h';
                    document.getElementById('vSizeStatus').innerText = "OK (符合防拷 0x40400)";
                } else {
                    currentFileMode = null;
                    document.getElementById('vSizeStatus').innerText = "❌ 錯誤 (未知規格容量)";
                }

                document.getElementById('vFileSize').innerText = `${actualSize} 位元組`;

                let isZeroZoneValid = true;
                for (let i = 0; i < 512; i++) {
                    if (i >= 0x10 && i <= 0x1FF) {
                        if (mcData[i] !== 0x00) {
                            isZeroZoneValid = false;
                            break;
                        }
                    }
                }
                document.getElementById('vZeroStatus').innerText = isZeroZoneValid ? "OK (全為 0x00)" : "❌ 異常 (含有雜訊數據)";

                    convertBtn.disabled = true;
                    startGlitchRain(); // 啟動警示數據紅雨

            reader.readAsArrayBuffer(file);

        // ==================== [ 🛠️ 轉換核心與分碟包裝工程 (100% 完整保留原本運算) ] ====================
        document.getElementById('convertBtn').addEventListener('click', function() {
            if (!mcBuffer || !currentFileMode) return;

            const mcData = new Uint8Array(mcBuffer);
            const zip = new JSZip();
            const isPatchEnabled = document.getElementById('greyScreenPatchCheck').checked;

            log(`🚀 啟動第一階段清洗：剝離最前段 512 位元組原始零區...`);
            const romCoreTemp = mcData.subarray(0x200); 

            let extracted200h = null;
            let romCore = null;

            if (currentFileMode === '40400h') {
                log(`🎯 進入防拷解析：自核心純資料起點（原檔 0x200 處）抽出 512 位元組防拷數據...`);
                extracted200h = romCoreTemp.subarray(0, 0x200); 
                log(`✂️ 【核心修正】：將此 512 位元組從資料流中徹底切除（防止後續 Block 切片移位）...`);
                romCore = romCoreTemp.subarray(0x200); 
            } else {
                romCore = romCoreTemp;
            }

            log(`➔ 清洗與邊界校正竣工！真正用於 Block 切片的核心資料長度：${romCore.length} 位元組`);

            const blockSize = 0x8000; 
            let compositeBlocks = [];

            log(`⚙️ 進入分流加工程序：採用 [ ${currentFileMode} ] 機制注入對應 Header...`);

            for (let i = 0; i < 8; i++) {
                const startPos = i * blockSize;
                const rawBlock = romCore.subarray(startPos, startPos + blockSize);
                
                let currentHeader;

                if (currentFileMode === '40400h') {
                    if (i === 0) {
                        currentHeader = [...config_40400_top, ...extracted200h, ...config_40400_bottom];
                        log(`   ✨ Block 1 動態拼接成型：Top (${config_40400_top.length}B) + 特徵數據 (${extracted200h.length}B) + Bottom (${config_40400_bottom.length}B)`);
                    } else {
                        currentHeader = [...block_headers_40400h[i]];
                    }
                } else {
                    currentHeader = [...block_headers_40200h[i]];
                }

                if (i === 0 && isPatchEnabled) {
                    if (currentHeader.length > 0x55) {
                        const originalValue = currentHeader[0x55].toString(16).toUpperCase().padStart(2, '0');
                        currentHeader[0x55] = 0x40;
                        log(`   ⚠️ <span style='color:#ffcc00;'><b>[灰屏修補機制觸發]</b>：已將 Disk A 標頭 Address 55h 由 ${originalValue}h 強制覆寫為 40h！</span>`);
                    }
                }
                
                const headerUint8 = new Uint8Array(currentHeader);
                const compBlock = new Uint8Array(headerUint8.length + rawBlock.length);
                compBlock.set(headerUint8, 0);
                compBlock.set(rawBlock, headerUint8.length);

                compositeBlocks.push(compBlock);
                log(`   ➔ 區塊 ${i + 1}: 已注入 Header (${headerUint8.length}B) + 數據 (32KiB)，總長度: ${compBlock.length} 位元組`);
            }

            const endMarker = new Uint8Array(disk_end_marker);
            const diskLetters = ['A', 'B', 'C', 'D'];

            log("⚙️ 啟動雙區塊物理直映封裝（強制輸出 4 片磁碟）...");

            for (let d = 0; d < 4; d++) {
                const blockIdx1 = d * 2;
                const blockIdx2 = d * 2 + 1;

                const b1 = compositeBlocks[blockIdx1];
                const b2 = compositeBlocks[blockIdx2];

                const validDataLength = b1.length + b2.length;
                const diskSliceRaw = new Uint8Array(validDataLength);
                diskSliceRaw.set(b1, 0);
                diskSliceRaw.set(b2, b1.length);

                const finalFileContent = new Uint8Array(diskSliceRaw.length + endMarker.length);
                finalFileContent.set(diskSliceRaw, 0);
                finalFileContent.set(endMarker, diskSliceRaw.length);

                const outFileName = `${originalFileName}.${diskLetters[d]}`;
                zip.file(outFileName, finalFileContent);
                
                const hexSize = finalFileContent.length.toString(16).toUpperCase() + 'h';
                log(`   ➔ 封裝完畢: [ ${outFileName} ] 最終檔案大小: <b>${hexSize}</b> (${finalFileContent.length}B)`);
            }

            zip.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}_Doctor_V6.3_DualMode.zip`;
                link.click();
                
                // ⚡ 核心視覺過渡觸發：隱藏 UI、顯示背景、顯示巨型繁中成功畫面、啟動粒子爆破

                    const successScreen = document.getElementById('successScreen');
                    successScreen.classList.add('show');
                    startQuantumBurst(); // 炸裂量子粒子
                }, 400); // 留下一點滑順的淡出緩衝時間
            });
        });

        // ==================== [ 拖曳配置 ] ====================
        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#00ff33'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = 'rgba(0, 255, 51, 0.3)'; }));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
