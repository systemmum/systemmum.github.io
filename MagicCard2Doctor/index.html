        :root {
            --glow-color: #00ff33;
            --glow-spread: 15px;
            --bg-dark: #08080a;
            --panel-bg: rgba(18, 18, 24, 0.75);
            --border-color: rgba(0, 255, 51, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: background 1s ease;
        }
        
        body.success-mode {
            background-image: url(https://systemmum.github.io/MagicCard2Doctor/MD2GD_bg.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        #effectCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        #mainUiWrapper {
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 1;
            transform: scale(1);
        }
        body.success-mode #mainUiWrapper {
            opacity: 0;
            transform: scale(0.92);
            pointer-events: none;
            display: none;
        }

        .build-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #888888;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 51, 0.3);
            letter-spacing: 0.5px;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255,255,255,0.05);

            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);

            padding: 60px 20px;

            background: rgba(0, 0, 0, 0.5);

        let particles = [];
        let scanLines = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initIdleEffects() {
            scanLines = [];
            particles = [];
            for(let i=0; i<3; i++) {
                scanLines.push({ y: Math.random() * canvas.height, speed: Math.random() * 0.5 + 0.2, opacity: Math.random() * 0.08 + 0.02 });
            }
            for(let i=0; i<25; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: (Math.random() - 0.5) * 0.3,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random() * 0.3 + 0.1
                });
            }
        }
        initIdleEffects();

        function startQuantumBurst() {
            animationMode = 'quantum';
            particles = [];
            for (let i = 0; i < 150; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 6 + 2;
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    radius: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.01 + 0.005,
                    color: `hsl(${Math.random() * 40 + 110}, 100%, 60%)`
                });
            }
        }

        function startGlitchRain() {
            animationMode = 'glitch';
            particles = []; 
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    length: Math.random() * 15 + 8,
                    speed: Math.random() * 15 + 10,
                    weight: Math.random() * 2 + 0.5,
                    opacity: Math.random() * 0.3 + 0.1
                });
            }
        }

        function loopEffects() {
            requestAnimationFrame(loopEffects);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (animationMode === 'idle') {
                ctx.strokeStyle = 'rgba(0, 255, 51, 1)';
                for(let i=0; i<scanLines.length; i++) {
                    let s = scanLines[i];
                    ctx.save();
                    ctx.globalAlpha = 0.2;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, s.y);
                    ctx.lineTo(canvas.width, s.y);
                    ctx.stroke();
                    ctx.restore();
                    s.y += s.speed;
                    if(s.y > canvas.height) s.y = 0;
                }
                for(let i=0; i<particles.length; i++) {
                    let p = particles[i];
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(0, 255, 51, 1)`;
                    ctx.fill();
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                }
            } 
            else if (animationMode === 'quantum') {
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    p.vx *= 0.98; p.vy *= 0.98; p.vy += 0.02;
                    p.alpha -= p.decay;

                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }

                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                    ctx.restore();
                }
            } 
            else if (animationMode === 'glitch') {
                ctx.strokeStyle = '#ff0055';
                for (let i = 0; i < particles.length; i++) {
                    let r = particles[i];
                    ctx.save();
                    ctx.globalAlpha = r.opacity;
                    ctx.lineWidth = r.weight;
                    ctx.beginPath();
                    ctx.moveTo(r.x, r.y);
                    ctx.lineTo(r.x + (Math.random() - 0.5) * 4, r.y + r.length);
                    ctx.stroke();
                    ctx.restore();
                    
                    r.y += r.speed;
                    if (r.y > canvas.height) {
                        r.y = -r.length;
                        r.x = Math.random() * canvas.width;
                    }
                }
            }

            [0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x10, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x82, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 0x43, 0x2A, 0x00, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x01, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x02, 0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x20, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x30, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x82, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 0x43, 0x2A, 0x00, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x02, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x02, 0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x40, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x50, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x82, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 0x43, 0x2A, 0x00, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x03, 0x03, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x02, 0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x60, 0x00, 0x00, 0x04], 
            [0x00, 0x00, 0x03, 0x00, 0x00, 0x32, 0x30, 0x32, 0x30, 0x30, 0x38, 0x32, 0x31, 0x00, 0x80, 0x00, 0x80, 0x70, 0x00, 0x00, 0x04]  
        ];

        const disk_end_marker = [0x00, 0x00];

        // ==================== [ 📥 檔案監聽與主動轉換流 ] ====================
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 重置降級診斷 UI 狀態
            document.getElementById('infoPanel').style.display = 'none';
            document.getElementById('fileInfo').style.display = 'none';
            document.getElementById('logBox').style.display = 'none';
            document.getElementById('logBox').innerHTML = '';
            initIdleEffects();
            animationMode = 'idle';

            const originalFileName = file.name.replace(/\.mc$/i, '');
            const reader = new FileReader();

            reader.onload = function(event) {
                const mcData = new Uint8Array(event.target.result);
                const actualSize = mcData.length;
                let currentFileMode = null;
                let isSizeValid = false;

                // 1. 容量合法性判斷
                if (actualSize === SIZE_40200) {
                    isSizeValid = true;
                    currentFileMode = '40200h';
                } else if (actualSize === SIZE_40400) {
                    isSizeValid = true;
                    currentFileMode = '40400h';
                }

                // 2. 原始零區 (0x10 - 0x1FF) 特徵校驗
                let isZeroZoneValid = true;
                for (let i = 0x10; i <= 0x1FF; i++) {
                    if (mcData[i] !== 0x00) {
                        isZeroZoneValid = false;
                        break;
                    }
                }

                // [🚨 異常分支] 觸發智慧降級診斷
                if (!isSizeValid || !isZeroZoneValid) {
                    document.getElementById('vFileSize').innerText = `${actualSize} 位元組`;
                    document.getElementById('vSizeStatus').innerText = isSizeValid ? `OK (${currentFileMode})` : "❌ 錯誤 (非預期硬體鏡像大小)";
                    document.getElementById('vZeroStatus').innerText = isZeroZoneValid ? "OK" : "❌ 異常 (零區區段內含有雜訊代碼)";
                    
                    document.getElementById('fileInfo').style.display = 'block';
                    document.getElementById('fileInfo').innerHTML = `<strong>審查終止檔案：</strong> ${file.name}`;
                    document.getElementById('infoPanel').style.display = 'block';
                    
                    const badge = document.getElementById('alertBadge');
                    badge.style.display = 'block';
                    badge.className = 'alert-badge badge-danger';
                    badge.innerHTML = `❌ 安全審查拒絕：二進位結構與實機硬體指紋不符，核心鎖定防止毀損輸出。`;
                    
                    log(`[硬體審查異常報告]`);
                    log(`-> 異常代碼：${!isSizeValid ? 'ERR_SIZE_MISMATCH' : 'ERR_ZEROZONE_CORRUPTED'}`);
                    log(`-> 檔案真實長度：${actualSize} 位元組`);
                    log(`-> 零區首位干擾元：0x${mcData.slice(0x10, 0x50).reduce((acc, x) => acc + x.toString(16).padStart(2,'0'), '')}...`);
                    
                    startGlitchRain(); // 啟動警示故障紅雨
                    return;
                }

                // [🟢 正常分支] 無感直達極速轉換
                const zip = new JSZip();
                const romCoreTemp = mcData.subarray(0x200); // 剝離 512 位元組前端
                let extracted200h = null;
                let romCore = null;

                if (currentFileMode === '40400h') {
                    extracted200h = romCoreTemp.subarray(0, 0x200); 
                    romCore = romCoreTemp.subarray(0x200); // 防止防拷區造成的 Block 索引偏移
                } else {
                    romCore = romCoreTemp;
                }

                const blockSize = 0x8000; // 32KiB
                let compositeBlocks = [];

                for (let i = 0; i < 8; i++) {
                    const startPos = i * blockSize;
                    const rawBlock = romCore.subarray(startPos, startPos + blockSize);
                    let currentHeader;

                    if (currentFileMode === '40400h') {
                        if (i === 0) {
                            currentHeader = [...config_40400_top, ...extracted200h, ...config_40400_bottom];
                            // 🌟 核心發現：防拷模式下原始 01h 直映至輸出 Block 0 的 26Ah
                            currentHeader[0x26A] = mcData[0x01]; 
                        } else {
                            currentHeader = [...block_headers_40400h[i]];
                        }
                    } else {
                        currentHeader = [...block_headers_40200h[i]];
                        if (i === 0) {
                            // 🌟 核心發現：常規模式下原始 00h/01h 直映回 Disk A 標頭 54h/55h
                            currentHeader[0x54] = mcData[0x00];
                            currentHeader[0x55] = mcData[0x01];
                        }
                    }

                    const headerUint8 = new Uint8Array(currentHeader);
                    const compBlock = new Uint8Array(headerUint8.length + rawBlock.length);
                    compBlock.set(headerUint8, 0);
                    compBlock.set(rawBlock, headerUint8.length);
                    compositeBlocks.push(compBlock);
                }

                const endMarker = new Uint8Array(disk_end_marker);
                const diskLetters = ['A', 'B', 'C', 'D'];

                for (let d = 0; d < 4; d++) {
                    const blockIdx1 = d * 2;
                    const blockIdx2 = d * 2 + 1;

                    const b1 = compositeBlocks[blockIdx1];
                    const b2 = compositeBlocks[blockIdx2];

                    const diskSliceRaw = new Uint8Array(b1.length + b2.length);
                    diskSliceRaw.set(b1, 0);
                    diskSliceRaw.set(b2, b1.length);

                    const finalFileContent = new Uint8Array(diskSliceRaw.length + endMarker.length);
                    finalFileContent.set(diskSliceRaw, 0);
                    finalFileContent.set(endMarker, diskSliceRaw.length);

                    zip.file(`${originalFileName}.${diskLetters[d]}`, finalFileContent);
                }

                // 執行打包下載並過渡 UI
                zip.generateAsync({ type: "blob" }).then(function(content) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `${originalFileName}_MC2GD_export.zip`;
                    link.click();
                    
                    document.body.classList.add('success-mode');
                    setTimeout(() => {
                        document.getElementById('successScreen').classList.add('show');
                        startQuantumBurst(); // 炸裂螢光量子綠粒子
                    }, 200);
                });
            };
            reader.readAsArrayBuffer(file);
        });

        // ==================== [ 🤝 拖曳互動設定 ] ====================
        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#00ff33'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = 'rgba(0, 255, 51, 0.3)'; }));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
    </script>
