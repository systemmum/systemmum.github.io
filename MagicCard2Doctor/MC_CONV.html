<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Card to Game Doctor Converter v4</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --border-color: #243552;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-amber: #f59e0b;
            --accent-green: #10b981;
        }

        body {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 950px;
            margin: 0 auto;
            padding: 30px 15px;
            line-height: 1.4;
        }

        h1 {
            font-size: 1.4rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            background: #0f172a;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.2s ease;
        }

        .drop-zone:hover {
            border-color: var(--accent-blue);
            background: #131e35;
        }

        .hidden-input { display: none; }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 1rem;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--accent-blue);
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: #1e293b;
            color: var(--text-main);
        }

        .badge.alert { background: #78350f; color: var(--accent-amber); }
        .badge.success { background: #064e3b; color: var(--accent-green); }

        .btn {
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }

        .btn:hover { background-color: #059669; }

        .log-box {
            background: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 15px;
            max-height: 480px;
            overflow-y: auto;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .log-entry { margin-bottom: 6px; border-left: 3px solid #334155; padding-left: 8px; }
        .log-entry.warn { border-left-color: var(--accent-amber); color: var(--accent-amber); }
        .log-entry.success { border-left-color: var(--accent-green); color: var(--accent-green); }
        .log-entry.info { border-left-color: var(--accent-blue); color: #cbd5e1; }
        .log-entry.skip { border-left-color: #475569; color: #64748b; }
        
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Magic Card Patcher SE V4 (20260709)</h1>
    
    <div class="drop-zone" id="dropZone">
        <p>📥 Drag & Drop Single-File Magic Card Dump (.bin / .fds) here</p>
        <input fileInput type="file" id="fileInput" class="hidden-input">
    </div>

    <div class="panel" id="statusPanel" style="display: none;">
        <div class="panel-title">
            <span>File Diagnostics</span>
            <span id="headerBadge" class="badge">Awaiting File...</span>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; font-size: 0.9rem;">
            <div>First Byte Header Value: <span id="txtHeader" class="highlight">-</span></div>
            <div>Trainer Mode Status: <span id="txtTrainer" class="highlight">-</span></div>
        </div>
    </div>

    <div class="panel" id="actionPanel" style="display: none;">
        <h2 class="panel-title">Processing Console (Split Range I/O Logic)</h2>
        <div style="margin-bottom: 15px;">
            <button class="btn" id="processBtn">Execute v4 Pass (Complete Decoupling)</button>
        </div>
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusPanel = document.getElementById('statusPanel');
        const actionPanel = document.getElementById('actionPanel');
        const headerBadge = document.getElementById('headerBadge');
        const txtHeader = document.getElementById('txtHeader');
        const txtTrainer = document.getElementById('txtTrainer');
        const logBox = document.getElementById('logBox');
        const processBtn = document.getElementById('processBtn');

        let fileData = null;
        let originalName = "";

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent-blue)'; });
        dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border-color)');
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border-color)';
            if(e.dataTransfer.files.length) processIncomingFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if(e.target.files.length) processIncomingFile(e.target.files[0]);
        });

        function processIncomingFile(file) {
            originalName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                fileData = new Uint8Array(e.target.result);
                analyzeFile();
            };
            reader.readAsArrayBuffer(file);
        }

        function printLog(text, type = "info") {
            const el = document.createElement('div');
            el.className = `log-entry ${type}`;
            el.innerHTML = text;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function analyzeFile() {
            statusPanel.style.display = 'block';
            actionPanel.style.display = 'block';
            logBox.innerHTML = "";
            
            const firstByte = fileData[0];
            const firstByteHex = "$" + firstByte.toString(16).toUpperCase().padStart(2, '0');
            txtHeader.textContent = firstByteHex;

            const hasTrainer = (firstByte & 0x40) !== 0;
            
            if (hasTrainer) {
                txtTrainer.textContent = "ACTIVE (Requires $7003 Entry Vector)";
                headerBadge.textContent = "Trainer Flags Detected";
                headerBadge.className = "badge alert";
                printLog(`[ANALYSIS] First byte is <span class="highlight">${firstByteHex}</span>. Bit 6 is ON: This game uses a Trainer block targeting $7000!`, "warn");
            } else {
                txtTrainer.textContent = "INACTIVE (Standard Boot)";
                headerBadge.textContent = "Standard Layout";
                headerBadge.className = "badge success";
                printLog(`[ANALYSIS] First byte is <span class="highlight">${firstByteHex}</span>. No custom trainer flags active.`, "success");
            }

            printLog(`[READY] File size: ${fileData.length} bytes. Click the button above to execute the smart repair pass.`, "info");
        }

        processBtn.addEventListener('click', () => {
            if (!fileData) return;

            let workingBuffer = new Uint8Array(fileData);
            let patchesApplied = 0;

            printLog(`--------------------------------------------------`, "info");
            printLog(`[SMART SCAN v4] Starting sequential scan with Split I/O Space rules...`, "info");
            printLog(`[RULE A] For $70xx space: Low Byte MUST be &lt; $80 to patch (protects $70CE Game RAM).`, "info");
            printLog(`[RULE B] For $71xx space: Patch unconditionally (allows $71CA / $71D2 hardware ports).`, "info");

            // Process the stream sequentially
            for (let i = 0; i < workingBuffer.length - 2; i++) {
                // Look for STA Absolute opcode ($8D)
                if (workingBuffer[i] === 0x8D) {
                    const lowByte = workingBuffer[i + 1];
                    const highByte = workingBuffer[i + 2];
                    
                    // Filter rule: Matches $70xx or $71xx
                    if (highByte === 0x70 || highByte === 0x71) {
                        const offsetHex = "0x" + i.toString(16).toUpperCase().padStart(4, '0');
                        const targetAddr = "$" + ((highByte << 8) | lowByte).toString(16).toUpperCase();
                        
                        // v4 Split-space logical check:
                        let isHardwareLatch = false;
                        
                        if (highByte === 0x70) {
                            if (lowByte < 0x80) {
                                isHardwareLatch = true;
                            } else {
                                // Rule A: Bypasses $70CE / $70CF in the $7000 range
                                printLog(`[GUARD BYPASS] Bypassed safe Game RAM variable at Offset <span class="highlight">${offsetHex}</span>: <code>STA ${targetAddr}</code> (Low Byte &gt;= $80)`, "skip");
                                continue;
                            }
                        } else if (highByte === 0x71) {
                            // Rule B: $71xx is exclusively used for FFE hardware latches ($71CA / $71D2)
                            isHardwareLatch = true;
                        }
                        
                        if (isHardwareLatch) {
                            printLog(`[TARGET DETECTED] Found FFE Hardware Latch at Offset <span class="highlight">${offsetHex}</span>: <code>STA ${targetAddr}</code>`, "warn");
                            printLog(`[MODIFICATION] Overwriting operand address with safe mirrored space <code>$EAEA</code>.`, "success");
                            
                            // Apply patch
                            workingBuffer[i + 1] = 0xEA;
                            workingBuffer[i + 2] = 0xEA;
                            patchesApplied++;
                            
                            // CRITICAL: Stop searching immediately to protect ALL subsequent code structures (like $7058)
                            printLog(`[SMART BREAK] First true hardware latch successfully patched! Terminating scan loop.`, "success");
                            break;
                        }
                    }
                }
            }

            if (patchesApplied === 0) {
                printLog(`[NOTICE] No active STA $70xx/$71xx latches required patching. Checking fallback vectors.`, "warn");
            }

            printLog(`[PASS 1 COMPLETE] Applied ${patchesApplied} structural patch(es).`, "success");
            printLog(`[PASS 2] Processing FDS / Game Doctor Entry Point Vectors...`, "info");

            let vectorPatched = false;
            // Scan initial execution window for old absolute jumps to realign to $7003
            for (let j = 0; j < 128; j++) {
                if (workingBuffer[j] === 0x4C) { // JMP
                    const destLow = workingBuffer[j+1];
                    const destHigh = workingBuffer[j+2];
                    if (destHigh !== 0x70 || destLow !== 0x03) {
                        const oldDest = "$" + ((destHigh << 8) | destLow).toString(16).toUpperCase();
                        workingBuffer[j+1] = 0x03;
                        workingBuffer[j+2] = 0x70;
                        printLog(`[VECTOR REPAIRED] Redirected initial JMP at offset 0x${j.toString(16).toUpperCase()} from ${oldDest} directly to Trainer vector <span class="highlight">$7003</span>!`, "success");
                        vectorPatched = true;
                        break;
                    }
                }
            }

            if (!vectorPatched) {
                printLog(`[NOTICE] No active jump sequence needed adjustments within execution header.`, "info");
            }

            printLog(`[SUCCESS] Binary stream structural update completed. Preparing download...`, "success");

            // Export updated binary
            const blob = new Blob([workingBuffer], { type: "application/octet-stream" });
            const link = document.createElement('a');
            const cleanName = originalName.replace(/(\.[\w\d]+)$/i, '_game_doctor_v4$1');
            link.href = URL.createObjectURL(blob);
            link.download = cleanName === originalName ? originalName + "_fixed.bin" : cleanName;
            link.click();
            URL.revokeObjectURL(link.href);
        });
    </script>
</body>
</html>
