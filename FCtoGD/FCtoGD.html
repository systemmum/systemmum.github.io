<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES 轉 GameDoctor 終極智能轉換器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .upload-box {
            border: 3px dashed #3498db;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: #fdfdfd;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-box:hover {
            background: #edf7fe;
            border-color: #2980b9;
        }
        #fileInput {
            display: none;
        }
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-left: 4px solid #2ecc71;
            border-radius: 4px;
            display: none;
        }
        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #eef2f7;
            border-radius: 6px;
            border: 1px solid #dcdde1;
            display: none;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 14px;
            margin-top: 8px;
        }
        .info-item {
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        .info-label {
            font-weight: bold;
            color: #7f8c8d;
        }
        .info-value {
            font-weight: bold;
            color: #2c3e50;
        }
        .alert-badge {
            margin-top: 12px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
        .badge-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .badge-warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .btn-container {
            text-align: center;
            margin-top: 25px;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
            background-color: #27ae60;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }
        .log-box {
            margin-top: 25px;
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
    </style>
</head>
<body>

    <h1>NES 轉 GameDoctor 終極智能轉換器</h1>

    <div class="container">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p style="font-size: 16px; margin-top: 10px; font-weight: bold;">點擊此處或拖曳 .nes 檔案到這裡</p>
            <span style="color: #7f8c8d; font-size: 13px;">(解鎖：自動識別 Mirroring 並自適應修改 GameDoctor 標頭內部碼)</span>
            <input type="file" id="fileInput" accept=".nes">
        </div>

        <div id="fileInfo" class="file-info"></div>

        <div id="infoPanel" class="info-panel">
            <div style="font-weight: bold; color: #34495e; border-bottom: 1px solid #bdc3c7; padding-bottom: 5px;">🔍 iNES Header 智能偵測結果：</div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">Mapper 編號: </span><span id="vMapper" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">鏡像方式 (Mirroring): </span><span id="vMirror" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">PRG ROM 大細: </span><span id="vPrg" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">CHR ROM 大細: </span><span id="vChr" class="info-value">-</span></div>
            </div>
            <div id="alertBadge" class="alert-badge"></div>
        </div>

        <div class="btn-container">
            <button id="convertBtn" disabled>開始自動轉換並打包 ZIP</button>
        </div>

        <div id="logBox" class="log-box"></div>
    </div>

    <script>
        let nesBuffer = null;
        let originalFileName = "game";
        let isVerticalMirror = false; // 紀錄是否為垂直鏡像

        // 101.1 固定插入數據基礎範本 (121 bytes)
        // 留意第 88 個元素 (即 Offset 58h / 畫面第 55h 位附近) 預設為 0x10
        const header1_template = [
            0x00, 0x00, 0x83, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x03, 0x00, 
            0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 
            0x00, 0x00, 0x00, 0x04, 0x80, 0x10, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 
            0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 
            0x04
        ];

        const header2_4 = new Uint8Array([
            0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 
            0x80, 0x00, 0x00, 0x00, 0x04
        ]);

        const header3 = new Uint8Array([
            0x00, 0x00, 0x82, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x01, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x02, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 0x04
        ]);

        const footer2_4 = new Uint8Array([0x00, 0x00]);

        function log(message) {
            const logBox = document.getElementById('logBox');
            logBox.style.display = 'block';
            logBox.innerHTML += message + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 解析檔案與自動判定
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            originalFileName = file.name.replace(/\.nes$/i, '');
            const reader = new FileReader();

            reader.onload = function(event) {
                nesBuffer = event.target.result;
                const nesData = new Uint8Array(nesBuffer);
                
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileInfo').innerHTML = `<strong>已載入檔案：</strong> ${file.name} (${file.size} Bytes)`;
                document.getElementById('logBox').innerHTML = '';
                log("--- 檔案載入，開始智能識別 ---");

                // 解碼屬性
                const prgSize = nesData[4] * 16;
                const chrSize = nesData[5] * 8;
                const mapperLow = nesData[6] >> 4;
                const mapperHigh = nesData[7] & 0xF0;
                const mapperNumber = mapperHigh | mapperLow;
                
                // 判定是否為垂直鏡像
                isVerticalMirror = (nesData[6] & 0x01) === 1;
                const mirroringType = isVerticalMirror ? "Vertical (垂直鏡像)" : "Horizontal (水平鏡像)";

                document.getElementById('vMapper').innerText = `${mapperNumber} ${mapperNumber === 2 ? '(UNROM)' : ''}`;
                document.getElementById('vMirror').innerText = mirroringType;
                document.getElementById('vPrg').innerText = `${prgSize} KB`;
                document.getElementById('vChr').innerText = `${chrSize} KB`;
                document.getElementById('infoPanel').style.display = 'block';

                const badge = document.getElementById('alertBadge');
                badge.style.display = 'block';
                badge.className = 'alert-badge';

                const isTargetMapper = (mapperNumber === 2);
                const isTargetSize = (prgSize === 128);

                if (isTargetMapper && isTargetSize) {
                    badge.classList.add('badge-success');
                    badge.innerHTML = `✅ 完美兼容：此 ROM 符合 UNROM 128KB 規格。系統已偵測為 <b>${mirroringType}</b>，轉換時會全自動調整標頭特徵碼！`;
                    log(`<span style='color:#2ecc71;'><b>智能確認：將為此 ${mirroringType} 遊戲進行自適應優化加工。</b></span>`);
                } else {
                    badge.classList.add('badge-warning');
                    badge.innerHTML = `⚠️ 注意：此 ROM 晶片或大小與預設不符 (Mapper: ${mapperNumber}, 大細: ${prgSize}KB)，強行轉換可能無法開機。`;
                }

                document.getElementById('convertBtn').disabled = false;
            };

            reader.readAsArrayBuffer(file);
        });

        // 核心加工作業
        document.getElementById('convertBtn').addEventListener('click', function() {
            if (!nesBuffer) return;

            const nesData = new Uint8Array(nesBuffer);
            const rawData = nesData.subarray(16);
            const chunkSize = 0x8000;

            let rawChunks = [];
            for (let i = 0; i < 4; i++) {
                let startPos = i * chunkSize;
                let endPos = startPos + chunkSize;
                let chunk = new Uint8Array(chunkSize);
                if (startPos < rawData.length) {
                    chunk.set(rawData.subarray(startPos, Math.min(endPos, rawData.length)));
                }
                rawChunks.push(chunk);
            }

            // 【核心動態修正邏輯】根據 Mirroring 動態決定 58h 填 0x10 還是 0x00
            let dynamicHeader1 = new Uint8Array(header1_template);
            if (isVerticalMirror) {
                dynamicHeader1[85] = 0x00; // 找到對應位置，動態將 10 改為 00 
                log("[優化] 偵測到 Vertical 鏡像，已自動將標頭 55h 行特徵位修正為 00");
            } else {
                dynamicHeader1[85] = 0x10; // 否則維持 10
                log("[優化] 偵測到 Horizontal 鏡像，維持標頭特徵位為 10");
            }

            // 分塊合成
            let b101_1 = new Uint8Array(dynamicHeader1.length + rawChunks[0].length);
            b101_1.set(dynamicHeader1, 0);
            b101_1.set(rawChunks[0], dynamicHeader1.length);

            let b102_1 = new Uint8Array(header2_4.length + rawChunks[1].length + footer2_4.length);
            b102_1.set(header2_4, 0);
            b102_1.set(rawChunks[1], header2_4.length);
            b102_1.set(footer2_4, header2_4.length + rawChunks[1].length);

            let b103_1 = new Uint8Array(header3.length + rawChunks[2].length);
            b103_1.set(header3, 0);
            b103_1.set(rawChunks[2], header3.length);

            let b104_1 = new Uint8Array(header2_4.length + rawChunks[3].length + footer2_4.length);
            b104_1.set(header2_4, 0);
            b104_1.set(rawChunks[3], header2_4.length);
            b104_1.set(footer2_4, header2_4.length + rawChunks[3].length);

            // 二合一打包
            const fileA_Data = new Uint8Array(b101_1.length + b102_1.length);
            fileA_Data.set(b101_1, 0);
            fileA_Data.set(b102_1, b101_1.length);
            const fileNameA = `${originalFileName}.A`;

            const fileB_Data = new Uint8Array(b103_1.length + b104_1.length);
            fileB_Data.set(b103_1, 0);
            fileB_Data.set(b104_1, b103_1.length);
            const fileNameB = `${originalFileName}.B`;

            // 生成 ZIP
            const zip = new JSZip();
            zip.file(fileNameA, fileA_Data);
            zip.file(fileNameB, fileB_Data);

            zip.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}.zip`;
                link.click();
                log(`<span style='color:#2ecc71;'><b>🎉 自適應轉換成功！[ ${originalFileName}.zip ] 已導出！</b></span>`);
            });
        });

        // 拖曳支援
        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.background = '#edf7fe'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.background = '#fdfdfd'; }));
        dropBox.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
