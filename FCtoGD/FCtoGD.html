<head>

    <style>

<body>

    <div class="build-badge">Build: 20260701_1644_V1</div>

    <h1>Famicom to GameDoctor Convertor</h1>

    <div class="container">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#00ff33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p style="font-size: 16px; margin-top: 10px; font-weight: bold;">點擊此處或拖曳 .nes 檔案到這裡</p>
            <span style="color: #888888; font-size: 13px;">(自動識別匹配：Mapper 0, Mapper 2, Mapper 3)</span>
            <input type="file" id="fileInput" accept=".nes">
        </div>

        <div id="fileInfo" class="file-info"></div>

        <div id="infoPanel" class="info-panel">
            <div style="font-weight: bold; color: #00ff33; border-bottom: 1px solid #333333; padding-bottom: 5px;" id="panelTitle">🔍 iNES Header 智能規格分析：</div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">Mapper 編號: </span><span id="vMapper" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">鏡像方式 (Mirroring): </span><span id="vMirror" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">PRG ROM 大細: </span><span id="vPrg" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">CHR ROM 大細: </span><span id="vChr" class="info-value">-</span></div>
            </div>
            <div id="alertBadge" class="alert-badge"></div>
        </div>

        <div class="btn-container">
            <button id="convertBtn" disabled>等待讀取檔案...</button>
        </div>

        <div id="logBox" class="log-box"></div>
    </div>

    <script>
        let nesBuffer = null;
        let originalFileName = "game";
        let detectedMapper = -1;
        let isHorizontalMirror = false;
        let prgSize = 0;
        let chrSize = 0;

        // ==================== [ ⚙️ 標頭數據模板庫 ] ====================
        
        // 【數據庫 A】UNROM (Mapper 2) 封裝模版
        const unrom_header1_template = [
            0x00, 0x00, 0x83, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x03, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 0x00, 0x00, 0x00, 0x04, 0x80, 0x10, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 0x04
        ];
        const unrom_header2_4 = new Uint8Array([0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x00,0x80,0x00,0x00,0x00,0x04]);
        const unrom_header3 = new Uint8Array([0x00,0x00,0x82,0x01,0x2A,0x4E,0x49,0x4E,0x54,0x45,0x4E,0x44,0x4F,0x2D,0x48,0x56,0x43,0x2A,0xFF,0x42,0x45,0x4E,0x4E,0x59,0x01,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x02,0x02,0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x00,0x80,0x00,0x00,0x00,0x04]);
        const unrom_footer2_4 = new Uint8Array([0x00, 0x00]);

        // 【數據庫 B】NROM (Mapper 0 + 16K PRG + 8K CHR) 標頭模版
        const nrom_prg_head_template = [
            0x00, 0x00, 0x84, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x03, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 0x00, 0x00, 0x00, 0x04, 0x80, 0xE0, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 0x04
        ];
        const nrom_chr_head = new Uint8Array([
            0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x20, 0x01, 0x00, 0x00, 0x04
        ]);
        const nrom_chr_foot = new Uint8Array([
            0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x01, 0x00, 0x00, 0x00, 0x00, 0x04, 0x00, 0x00, 0x00
        ]);

        // 【數據庫 C】CNROM (Mapper 3 + 32K PRG + 16K CHR) 標頭模版
        // 🛠️ 55h 位元（索引 85）固定為您設定的規格：0xC0
        const cnrom_32k_prg_head_template = [
            0x00, 0x00, 0x84, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x03, 0x00, 
            0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 
            0x00, 0x00, 0x00, 0x04, 0x80, 0xC0, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 0x04
        ];
        const cnrom_16k_chr_head = new Uint8Array([
            0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x40, 0x01, 0x00, 0x00, 0x04
        ]);
        const cnrom_16k_chr_foot = new Uint8Array([
            0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x01, 0x00, 0x00, 0x00, 0x00, 0x04, 0x00, 0x00, 0x00
        ]);

        function log(message) {
            const logBox = document.getElementById('logBox');
            logBox.style.display = 'block';
            logBox.innerHTML += message + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        // ==================== [ 🔍 交叉智能識別與匹配 ] ====================
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.body.classList.remove('success-bg'); 
            originalFileName = file.name.replace(/\.nes$/i, '');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                nesBuffer = event.target.result;
                const nesData = new Uint8Array(nesBuffer);
                
                // 解析 iNES Header
                prgSize = nesData[4] * 16;
                chrSize = nesData[5] * 8;
                const mapperLow = nesData[6] >> 4;
                const mapperHigh = nesData[7] & 0xF0;
                detectedMapper = mapperHigh | mapperLow;
                
                isHorizontalMirror = (nesData[6] & 0x01) === 0;
                const mirroringStr = isHorizontalMirror ? "Horizontal (水平)" : "Vertical (垂直)";

                document.getElementById('vMapper').innerText = `${detectedMapper}`;
                document.getElementById('vMirror').innerText = mirroringStr;
                document.getElementById('vPrg').innerText = `${prgSize} KB`;
                document.getElementById('vChr').innerText = `${chrSize} KB`;
                document.getElementById('infoPanel').style.display = 'block';

                const badge = document.getElementById('alertBadge');
                badge.style.display = 'block';
                badge.className = 'alert-badge';
                const convertBtn = document.getElementById('convertBtn');

                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileInfo').innerHTML = `<strong>已載入原始檔：</strong> ${file.name} (${file.size} Bytes)`;
                document.getElementById('logBox').innerHTML = '';
                log("--- 啟動精準組合規格匹配分析 ---");

                // ✨ 三向智能交叉核對分流
                if (detectedMapper === 0 && prgSize === 16 && chrSize === 8) {
                    document.getElementById('vMapper').innerText += " (NROM 16K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 0 + PRG 16K + CHR 8K</b> 流水線。將採用 4000H 雙倍鏡像粘合處理！`;
                    convertBtn.innerText = "執行 NROM 16K 鏡像粘合打包";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 1] NROM 16K 鏡像倍增封裝管道。");
                } 
                else if (detectedMapper === 2 && prgSize === 128) {
                    document.getElementById('vMapper').innerText += " (UNROM 128K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 2 + PRG 128K</b> 標準雙片規格。系統將輸出 .A / .B 雙檔壓縮包！`;
                    convertBtn.innerText = "執行 UNROM 雙片封裝打包";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 2] UNROM 128K 雙片分片封裝管道。");
                } 
                else if (detectedMapper === 3 && prgSize === 32 && chrSize === 16) {
                    document.getElementById('vMapper').innerText += " (CNROM 32K/16K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 3 + PRG 32K + CHR 16K</b> 流水線。將採用固定標頭 0xC0 進行純加法封裝！`;
                    convertBtn.innerText = "執行 CNROM 32K 完美加法封裝";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 3] CNROM 32K 固態加法封裝管道。");
                }
                else {
                    badge.className = 'alert-badge badge-warning';
                    badge.innerHTML = `⚠️ 無法識別此規格組合：目前支援已定義的 Mapper 0, 2, 3 特性。`;
                    convertBtn.innerText = "規格未匹配，拒絕打包";
                    convertBtn.disabled = true;
                    log("❌ 錯誤：找不到匹配該 Mapper 編號和大小組合的專屬打包規則。");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // ==================== [ 🛠️ 執行處理核心 ] ====================
        document.getElementById('convertBtn').addEventListener('click', function() {
            if (!nesBuffer) return;

            const nesData = new Uint8Array(nesBuffer);
            const zip = new JSZip();
            const rawData = nesData.subarray(16); // 剝除外層 16B iNES Header

            // 🌟 【管道 1】: Mapper 0 + 16K PRG + 8K CHR (雙倍粘合邏輯)
            if (detectedMapper === 0 && prgSize === 16 && chrSize === 8) {
                log("🚀 [管道 1] 啟動 NROM 16K 鏡像粘合流水線...");

                const prgSourceSize = 0x4000; 
                let srcPrg = new Uint8Array(prgSourceSize);
                if (rawData.length >= 0) {
                    srcPrg.set(rawData.subarray(0, Math.min(prgSourceSize, rawData.length)));
                }
                
                let prgHeaderlessCopied = new Uint8Array(0x8000);
                prgHeaderlessCopied.set(srcPrg, 0);
                prgHeaderlessCopied.set(srcPrg, 0x4000);
                log("➔ 16K PRG 雙倍粘合 32K (8000H) 完成。");

                const chrSourceSize = 0x2000;
                let chrHeaderless = new Uint8Array(chrSourceSize);
                if (rawData.length >= prgSourceSize) {
                    chrHeaderless.set(rawData.subarray(prgSourceSize, Math.min(prgSourceSize + chrSourceSize, rawData.length)));
                }
                log("➔ 8K CHR 數據分離完成。");

                let prgHeader = new Uint8Array(nrom_prg_head_template);
                if (isHorizontalMirror) {
                    prgHeader[0x55] = 0xF0;
                    log("➔ 水平鏡像：0x55 處動態修正為 F0");
                } else {
                    prgHeader[0x55] = 0xE0;
                    log("➔ 垂直鏡像：0x55 處保持預設 E0");
                }

                const totalSize = prgHeader.length + prgHeaderlessCopied.length + nrom_chr_head.length + chrHeaderless.length + nrom_chr_foot.length;
                const finalA_Data = new Uint8Array(totalSize);
                
                let offset = 0;
                finalA_Data.set(prgHeader, offset); offset += prgHeader.length;
                finalA_Data.set(prgHeaderlessCopied, offset); offset += prgHeaderlessCopied.length;
                finalA_Data.set(nrom_chr_head, offset); offset += nrom_chr_head.length;
                finalA_Data.set(chrHeaderless, offset); offset += chrHeaderless.length;
                finalA_Data.set(nrom_chr_foot, offset);
                
                log(`➔ 管道 1 結構加法合體完畢，總大小: ${finalA_Data.byteLength} Bytes`);
                zip.file(`${originalFileName}.A`, finalA_Data);
                exportZip(zip, "NROM_16K");
            }
            
            // 🌟 【管道 2】: Mapper 2 + 128K PRG (雙生封裝流)
            else if (detectedMapper === 2 && prgSize === 128) {
                log("🚀 [管道 2] 啟動 UNROM 128K 四分片切割封裝程序...");
                
                const chunkSize = 0x8000;
                let rawChunks = [];
                for (let i = 0; i < 4; i++) {
                    let startPos = i * chunkSize;
                    let chunk = new Uint8Array(chunkSize);
                    if (startPos < rawData.length) {
                        chunk.set(rawData.subarray(startPos, Math.min(startPos + chunkSize, rawData.length)));
                    }
                    rawChunks.push(chunk);
                }

                let dynamicHeader1 = new Uint8Array(unrom_header1_template);
                if (isHorizontalMirror) { dynamicHeader1[85] = 0x10; }
                else { dynamicHeader1[85] = 0x00; }

                let b101_1 = new Uint8Array(dynamicHeader1.length + rawChunks[0].length);
                b101_1.set(dynamicHeader1, 0); b101_1.set(rawChunks[0], dynamicHeader1.length);

                let b102_1 = new Uint8Array(unrom_header2_4.length + rawChunks[1].length + unrom_footer2_4.length);
                b102_1.set(unrom_header2_4, 0); b102_1.set(rawChunks[1], unrom_header2_4.length); b102_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[1].length);

                let b103_1 = new Uint8Array(unrom_header3.length + rawChunks[2].length);
                b103_1.set(unrom_header3, 0); b103_1.set(rawChunks[2], unrom_header3.length);

                let b104_1 = new Uint8Array(unrom_header2_4.length + rawChunks[3].length + unrom_footer2_4.length);
                b104_1.set(unrom_header2_4, 0); b104_1.set(rawChunks[3], unrom_header2_4.length); b104_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[3].length);

                const fileA_Data = new Uint8Array(b101_1.length + b102_1.length);
                fileA_Data.set(b101_1, 0); fileA_Data.set(b102_1, b101_1.length);
                
                const fileB_Data = new Uint8Array(b103_1.length + b104_1.length);
                fileB_Data.set(b103_1, 0); fileB_Data.set(b104_1, b103_1.length);

                zip.file(`${originalFileName}.A`, fileA_Data);
                zip.file(`${originalFileName}.B`, fileB_Data);
                log("➔ 管道 2 雙生數據分片封裝完成。");
                exportZip(zip, "UNROM_128K");
            }

            // 🌟 【管道 3】: Mapper 3 + 32K PRG + 16K CHR (純 0xC0 加法管線)
            else if (detectedMapper === 3 && prgSize === 32 && chrSize === 16) {
                log("🚀 [管道 3] 啟動 CNROM 32K 固態加法流水線...");
                
                const part_8000h_prg = rawData.subarray(0, 0x8000);       // 32KB PRG
                const part_4000h_chr = rawData.subarray(0x8000, 0x8000 + 0x4000); // 16KB CHR
                
                log(`➔ 提取 PRG 32KB 區段：${part_8000h_prg.length} Bytes`);
                log(`➔ 提取 CHR 16KB 區段：${part_4000h_chr.length} Bytes`);

                // 載入預載模板（其 55h 已按要求固定為結構配置 0xC0）
                let prgHeader = new Uint8Array(cnrom_32k_prg_head_template);
                log("➔ 狀態確認：標頭 0x55 處已套用固定數值 0xC0");

                // 純加法組合拼接
                const totalSize = prgHeader.length + part_8000h_prg.length + cnrom_16k_chr_head.length + part_4000h_chr.length + cnrom_16k_chr_foot.length;
                const finalData = new Uint8Array(totalSize);
                
                let offset = 0;
                finalData.set(prgHeader, offset);            offset += prgHeader.length;
                finalData.set(part_8000h_prg, offset);       offset += part_8000h_prg.length;
                finalData.set(cnrom_16k_chr_head, offset);    offset += cnrom_16k_chr_head.length;
                finalData.set(part_4000h_chr, offset);       offset += part_4000h_chr.length;
                finalData.set(cnrom_16k_chr_foot, offset);
                
                log(`➔ 管道 3 固態結構純加法合體完畢，總大小: ${finalData.byteLength} Bytes`);
                zip.file(`${originalFileName}.A`, finalData);
                exportZip(zip, "CNROM_32K");
            }
        });

        function exportZip(zipInstance, typeStr) {
            zipInstance.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}_${typeStr}_Perfect.zip`;
                link.click();
                
                log(`<span style='color:#ffffff;'><b>🎉 規格解鎖，封裝大成功！匯出檔案：[ ${originalFileName}_${typeStr}_Perfect.zip ]！</b></span>`);
                document.body.classList.add('success-bg');
            });
        }

        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#00ff33'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#555555'; }));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
