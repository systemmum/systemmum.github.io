                const mapperHigh = nesData[7] & 0xF0;
                detectedMapper = mapperHigh | mapperLow;
                
                isHorizontalMirror = (nesData[6] & 0x01) === 0;
                const mirroringStr = isHorizontalMirror ? "Horizontal (水平)" : "Vertical (垂直)";

                document.getElementById('vMapper').innerText = `${detectedMapper}`;
                document.getElementById('vMirror').innerText = mirroringStr;
                document.getElementById('vPrg').innerText = `${prgSize} KB`;
                document.getElementById('vChr').innerText = `${chrSize} KB`;
                document.getElementById('infoPanel').style.display = 'block';

                const badge = document.getElementById('alertBadge');
                badge.style.display = 'block';
                badge.className = 'alert-badge';
                const convertBtn = document.getElementById('convertBtn');

                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileInfo').innerHTML = `<strong>已載入原始檔：</strong> ${file.name} (${file.size} Bytes)`;
                document.getElementById('logBox').innerHTML = '';
                log("--- 啟動精準組合規格匹配分析 ---");

                // ✨ 智能交叉核對多流分流
                if (detectedMapper === 0 && prgSize === 16 && chrSize === 8) {
                    document.getElementById('vMapper').innerText += " (NROM 16K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 0 + PRG 16K + CHR 8K</b> 流水線。將採用 4000H 雙倍鏡像粘合處理！`;
                    convertBtn.innerText = "執行 NROM 16K 鏡像粘合打包";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 1] NROM 16K 鏡像倍增封裝管道。");
                } 
                else if (detectedMapper === 2 && prgSize === 128) {
                    document.getElementById('vMapper').innerText += " (UNROM 128K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 2 + PRG 128K</b> 標準雙片規格。系統將輸出 .A / .B 雙檔壓縮包！`;
                    convertBtn.innerText = "執行 UNROM 雙片封裝打包";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 2] UNROM 128K 雙片分片封裝管道。");
                } 
                else if (detectedMapper === 3 && prgSize === 32 && chrSize === 16) {
                    document.getElementById('vMapper').innerText += " (CNROM 32K/16K)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 3 + PRG 32K + CHR 16K</b> 流水線。將採用固定標頭 0xC0 進行純加法封裝！`;
                    convertBtn.innerText = "執行 CNROM 32K 完美加法封裝";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 3] CNROM 32K 固態加法封裝管道。");
                }
                else if (detectedMapper === 3 && prgSize === 32 && chrSize === 32) {
                    document.getElementById('vMapper').innerText += " (CNROM 32K/32K 大容量版)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 3 + PRG 32K + CHR 32K 垂直鏡像</b> 高級流水線。將採用 0x83 引導頭封裝！`;
                    convertBtn.innerText = "執行 CNROM 32K 大容量垂直封裝";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 4] CNROM 32K/32K 大容量垂直鏡像加法管道。");
                }
                else if (detectedMapper === 66 && prgSize === 128 && chrSize === 32) {
                    document.getElementById('vMapper').innerText += " (GxROM 128K/32K 三碟版)";
                    badge.className = 'alert-badge badge-success';
                    badge.innerHTML = `✅ 匹配成功：符合 <b>Mapper 66 + PRG 128K + CHR 32K 水平鏡像</b> 高級流水線。系統將輸出 .A / .B / .C 三碟壓縮包！`;
                    convertBtn.innerText = "執行 Mapper 66 三磁碟分片打包";
                    convertBtn.disabled = false;
                    log("🟢 精准分配：進入 [管道 5] Mapper 66 雙層夾心對稱分片管道。");
                }
                else {
                    badge.className = 'alert-badge badge-warning';
                    badge.innerHTML = `⚠️ 無法識別此規格組合：目前支援已定義的 Mapper 0, 2, 3, 66 的特定容量組合。`;
                    convertBtn.innerText = "規格未匹配，拒絕打包";
                    convertBtn.disabled = true;
                    log("❌ 錯誤：找不到匹配該 Mapper 編號和大小鏡像組合的專屬打包規則。");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // ==================== [ 🛠️ 執行處理核心 ] ====================
        document.getElementById('convertBtn').addEventListener('click', function() {
            if (!nesBuffer) return;

            const nesData = new Uint8Array(nesBuffer);
            const zip = new JSZip();
            const rawData = nesData.subarray(16); // 剝除外層 16B iNES Header

            // 🌟 【管道 1】: Mapper 0
            if (detectedMapper === 0 && prgSize === 16 && chrSize === 8) {
                log("🚀 [管道 1] 啟動 NROM 16K 鏡像粘合流水線...");
                const prgSourceSize = 0x4000; 
                let srcPrg = new Uint8Array(prgSourceSize);
                if (rawData.length >= 0) { srcPrg.set(rawData.subarray(0, Math.min(prgSourceSize, rawData.length))); }
                
                let prgHeaderlessCopied = new Uint8Array(0x8000);
                prgHeaderlessCopied.set(srcPrg, 0); prgHeaderlessCopied.set(srcPrg, 0x4000);

                const chrSourceSize = 0x2000;
                let chrHeaderless = new Uint8Array(chrSourceSize);
                if (rawData.length >= prgSourceSize) { chrHeaderless.set(rawData.subarray(prgSourceSize, Math.min(prgSourceSize + chrSourceSize, rawData.length))); }

                let prgHeader = new Uint8Array(nrom_prg_head_template);
                if (isHorizontalMirror) { prgHeader[0x55] = 0xF0; } else { prgHeader[0x55] = 0xE0; }

                const totalSize = prgHeader.length + prgHeaderlessCopied.length + nrom_chr_head.length + chrHeaderless.length + nrom_chr_foot.length;
                const finalA_Data = new Uint8Array(totalSize);
                
                let offset = 0;
                finalA_Data.set(prgHeader, offset); offset += prgHeader.length;
                finalA_Data.set(prgHeaderlessCopied, offset); offset += prgHeaderlessCopied.length;
                finalA_Data.set(nrom_chr_head, offset); offset += nrom_chr_head.length;
                finalA_Data.set(chrHeaderless, offset); offset += chrHeaderless.length;
                finalA_Data.set(nrom_chr_foot, offset);
                
                zip.file(`${originalFileName}.A`, finalA_Data);
                exportZip(zip, "NROM_16K");
            }
            
            // 🌟 【管道 2】: Mapper 2
            else if (detectedMapper === 2 && prgSize === 128) {
                log("🚀 [管道 2] 啟動 UNROM 128K 四分片切割封裝程序...");
                const chunkSize = 0x8000;
                let rawChunks = [];
                for (let i = 0; i < 4; i++) {
                    let startPos = i * chunkSize;
                    let chunk = new Uint8Array(chunkSize);
                    if (startPos < rawData.length) { chunk.set(rawData.subarray(startPos, Math.min(startPos + chunkSize, rawData.length))); }
                    rawChunks.push(chunk);
                }

                let dynamicHeader1 = new Uint8Array(unrom_header1_template);
                if (isHorizontalMirror) { dynamicHeader1[85] = 0x10; } else { dynamicHeader1[85] = 0x00; }

                let b101_1 = new Uint8Array(dynamicHeader1.length + rawChunks[0].length);
                b101_1.set(dynamicHeader1, 0); b101_1.set(rawChunks[0], dynamicHeader1.length);

                let b102_1 = new Uint8Array(unrom_header2_4.length + rawChunks[1].length + unrom_footer2_4.length);
                b102_1.set(unrom_header2_4, 0); b102_1.set(rawChunks[1], unrom_header2_4.length); b102_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[1].length);

                let b103_1 = new Uint8Array(unrom_header3.length + rawChunks[2].length);
                b103_1.set(unrom_header3, 0); b103_1.set(rawChunks[2], unrom_header3.length);

                let b104_1 = new Uint8Array(unrom_header2_4.length + rawChunks[3].length + unrom_footer2_4.length);
                b104_1.set(unrom_header2_4, 0); b104_1.set(rawChunks[3], unrom_header2_4.length); b104_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[3].length);

                const fileA_Data = new Uint8Array(b101_1.length + b102_1.length);
                fileA_Data.set(b101_1, 0); fileA_Data.set(b102_1, b101_1.length);
                
                const fileB_Data = new Uint8Array(b103_1.length + b104_1.length);
                fileB_Data.set(b103_1, 0); fileB_Data.set(b104_1, b103_1.length);

                zip.file(`${originalFileName}.A`, fileA_Data);
                zip.file(`${originalFileName}.B`, fileB_Data);
                exportZip(zip, "UNROM_128K");
            }

            // 🌟 【管道 3】: Mapper 3 (32K + 16K)
            else if (detectedMapper === 3 && prgSize === 32 && chrSize === 16) {
                log("🚀 [管道 3] 啟動 CNROM 32K/16K 固態加法流水線...");
                const part_8000h_prg = rawData.subarray(0, 0x8000);
                const part_4000h_chr = rawData.subarray(0x8000, 0x8000 + 0x4000);

                let prgHeader = new Uint8Array(cnrom_32k_prg_head_template);
                const totalSize = prgHeader.length + part_8000h_prg.length + cnrom_16k_chr_head.length + part_4000h_chr.length + cnrom_16k_chr_foot.length;
                const finalData = new Uint8Array(totalSize);
                
                let offset = 0;
                finalData.set(prgHeader, offset);            offset += prgHeader.length;
                finalData.set(part_8000h_prg, offset);       offset += part_8000h_prg.length;
                finalData.set(cnrom_16k_chr_head, offset);    offset += cnrom_16k_chr_head.length;
                finalData.set(part_4000h_chr, offset);       offset += part_4000h_chr.length;
                finalData.set(cnrom_16k_chr_foot, offset);
                
                zip.file(`${originalFileName}.A`, finalData);
                exportZip(zip, "CNROM_32K");
            }

            // 🌟 【管道 4】: Mapper 3 (32K PRG + 32K CHR 垂直鏡像) 大容量加法流水線
            else if (detectedMapper === 3 && prgSize === 32 && chrSize === 32) {
                log("🚀 [管道 4] 啟動 CNROM 32K/32K 垂直大容量固態拼接程序...");
                
                const part_32k_prg = rawData.subarray(0, 0x8000);        
                const part_32k_chr = rawData.subarray(0x8000, 0x10000);   
                
                log(`➔ 提取 PRG 區段成功：${part_32k_prg.length} Bytes`);
                log(`➔ 提取 CHR 大容量區段成功：${part_32k_chr.length} Bytes`);
                
                let prgHeader = new Uint8Array(cnrom_32k_v_prg_head);
                log("➔ 鏡像特徵鎖定：垂直鏡像 (標頭 Index 2 已設定為 0x83，特徵為 1990 HKG)");

                const totalSize = prgHeader.length + part_32k_prg.length + cnrom_32k_chr_head.length + part_32k_chr.length + cnrom_32k_chr_foot.length;
                const finalData = new Uint8Array(totalSize);
                
                let offset = 0;
                finalData.set(prgHeader, offset);            offset += prgHeader.length;
                finalData.set(part_32k_prg, offset);         offset += part_32k_prg.length;
                finalData.set(cnrom_32k_chr_head, offset);    offset += cnrom_32k_chr_head.length;
                finalData.set(part_32k_chr, offset);         offset += part_32k_chr.length;
                finalData.set(cnrom_32k_chr_foot, offset);
                
                log(`➔ 管道 4 機械加法完美合體，總大小: ${finalData.byteLength} Bytes`);
                zip.file(`${originalFileName}.A`, finalData);
                exportZip(zip, "CNROM_32K_Large");
            }

            // 🌟 【管道 5】: Mapper 66 (128K PRG + 32K CHR 水平鏡像) 三碟封裝流水線
            else if (detectedMapper === 66 && prgSize === 128 && chrSize === 32) {
                log("🚀 [管道 5] 啟動 Mapper 66 128K/32K 三磁碟精準切割打包程序...");

                // 轉為 Uint8Array 以備加載
                const d1_main = new Uint8Array(m66_disk1_main_head);
                const d1_mid  = new Uint8Array(m66_disk1_mid_head);
                const d2_main = new Uint8Array(m66_disk2_main_head);
                const d2_mid  = new Uint8Array(m66_disk2_mid_head);
                const d3_main = new Uint8Array(m66_disk3_main_head);

                // --- 🧱 [Disk 1 構造] ---
                const p1_data = rawData.subarray(0, 0x8000);       // PRG 0K ~ 32K
                const p2_data = rawData.subarray(0x8000, 0x10000); // PRG 32K ~ 64K
                log(`➔ Disk 1：成功截取前半部雙 8000H PRG 區段`);

                const d1_total_size = d1_main.length + p1_data.length + d1_mid.length + p2_data.length + m66_common_foot.length;
                const disk1_Data = new Uint8Array(d1_total_size);
                let off1 = 0;
                disk1_Data.set(d1_main, off1);        off1 += d1_main.length;
                disk1_Data.set(p1_data, off1);        off1 += p1_data.length;
                disk1_Data.set(d1_mid, off1);         off1 += d1_mid.length;
                disk1_Data.set(p2_data, off1);        off1 += p2_data.length;
                disk1_Data.set(m66_common_foot, off1);

                // --- 🧱 [Disk 2 構造] ---
                const p3_data = rawData.subarray(0x10000, 0x18000); // PRG 64K ~ 96K
                const p4_data = rawData.subarray(0x18000, 0x20000); // PRG 96K ~ 128K
                log(`➔ Disk 2：成功截取後半部雙 8000H PRG 區段 (PRG 數據完結)`);

                const d2_total_size = d2_main.length + p3_data.length + d2_mid.length + p4_data.length + m66_common_foot.length;
                const disk2_Data = new Uint8Array(d2_total_size);
                let off2 = 0;
                disk2_Data.set(d2_main, off2);        off2 += d2_main.length;
                disk2_Data.set(p3_data, off2);        off2 += p3_data.length;
                disk2_Data.set(d2_mid, off2);         off2 += d2_mid.length;
                disk2_Data.set(p4_data, off2);        off2 += p4_data.length;
                disk2_Data.set(m66_common_foot, off2);

                // --- 🧱 [Disk 3 構造] ---
                const chr_all_data = rawData.subarray(0x20000, 0x28000); // CHR 0K ~ 32K 全段 (32KB)
                log(`➔ Disk 3：成功截取完整 32KB CHR 獨立區段`);

                const d3_total_size = d3_main.length + chr_all_data.length + m66_common_foot.length;
                const disk3_Data = new Uint8Array(d3_total_size);
                let off3 = 0;
                disk3_Data.set(d3_main, off3);        off3 += d3_main.length;
                disk3_Data.set(chr_all_data, off3);   off3 += chr_all_data.length;
                disk3_Data.set(m66_common_foot, off3);

                // 打包匯出
                zip.file(`${originalFileName}.A`, disk1_Data);
                zip.file(`${originalFileName}.B`, disk2_Data);
                zip.file(`${originalFileName}.C`, disk3_Data);
                log(`➔ 管道 5 三片分離黏合機械工程全數竣工！`);
                exportZip(zip, "Mapper66_3Disks");
            }
        });

        function exportZip(zipInstance, typeStr) {
            zipInstance.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}_${typeStr}_Perfect.zip`;
                link.click();
                log(`<span style='color:#ffffff;'><b>🎉 規格解鎖，封裝大成功！匯出：[ ${originalFileName}_${typeStr}_Perfect.zip ]！</b></span>`);
                document.body.classList.add('success-bg');
            });
        }

        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#00ff33'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#555555'; }));
        dropBox.addEventListener('drop', (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
