<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NES 轉 GameDoctor 雙合一終極智能轉換器 (完美對齊修正版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0c0c0c;
            color: #ffffff;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            transition: background-color 0.5s ease;
        }
        body.success-bg {
            background-color: #00ff33 !important;
            color: #000000 !important;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        body.success-bg h1 {
            color: #000000;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
            border: 1px solid #333333;
            transition: all 0.5s ease;
        }
        body.success-bg .container {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid #ffffff;
        }
        .upload-box {
            border: 3px dashed #555555;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            background: #151515;
            cursor: pointer;
        }
        body.success-bg .upload-box {
            background: #f5f5f5;
            border-color: #00ff33;
        }
        .upload-box:hover {
            background: #222222;
            border-color: #888888;
        }
        #fileInput {
            display: none;
        }
        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #252525;
            border-left: 4px solid #00ff33;
            border-radius: 4px;
            display: none;
        }
        body.success-bg .file-info {
            background: #e8fee8;
            border-left-color: #00aa22;
        }
        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #252525;
            border-radius: 6px;
            border: 1px solid #333333;
            display: none;
        }
        body.success-bg .info-panel {
            background: #f0f0f0;
            border-color: #cccccc;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            font-size: 14px;
            margin-top: 8px;
        }
        .info-item {
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #333333;
        }
        body.success-bg .info-item {
            background: #ffffff;
            border-color: #dddddd;
        }
        .info-label {
            font-weight: bold;
            color: #888888;
        }
        body.success-bg .info-label {
            color: #666666;
        }
        .info-value {
            font-weight: bold;
            color: #ffffff;
        }
        body.success-bg .info-value {
            color: #000000;
        }
        .alert-badge {
            margin-top: 12px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            display: none;
        }
        .badge-success {
            background-color: #1b4322;
            color: #7fdf8a;
            border: 1px solid #23582d;
        }
        body.success-bg .badge-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .badge-warning {
            background-color: #4b3e1d;
            color: #f3d47a;
            border: 1px solid #635226;
        }
        .btn-container {
            text-align: center;
            margin-top: 25px;
        }
        button {
            background-color: #333333;
            color: #777777;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:not(:disabled) {
            background-color: #00ff33;
            color: #000000;
        }
        button:hover:not(:disabled) {
            background-color: #00cc22;
        }
        button:disabled {
            background-color: #333333;
            color: #777777;
            cursor: not-allowed;
        }
        .log-box {
            margin-top: 25px;
            background: #000000;
            color: #00ff33;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #222222;
            display: none;
        }
        body.success-bg .log-box {
            background: #222222;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>NES 轉 GameDoctor 雙合一終極智能轉換器</h1>

    <div class="container">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#00ff33" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p style="font-size: 16px; margin-top: 10px; font-weight: bold;">點擊此處或拖曳 .nes 檔案到這裡</p>
            <span style="color: #888888; font-size: 13px;">(自動識別：Mapper 0 [NROM 精準單檔 .A] / Mapper 2 [UNROM 雙檔 .A/.B])</span>
            <input type="file" id="fileInput" accept=".nes">
        </div>

        <div id="fileInfo" class="file-info"></div>

        <div id="infoPanel" class="info-panel">
            <div style="font-weight: bold; color: #00ff33; border-bottom: 1px solid #333333; padding-bottom: 5px;">🔍 iNES Header 智能規格分析：</div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">Mapper 編號: </span><span id="vMapper" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">鏡像方式 (Mirroring): </span><span id="vMirror" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">PRG ROM 大細: </span><span id="vPrg" class="info-value">-</span></div>
                <div class="info-item"><span class="info-label">CHR ROM 大細: </span><span id="vChr" class="info-value">-</span></div>
            </div>
            <div id="alertBadge" class="alert-badge"></div>
        </div>

        <div class="btn-container">
            <button id="convertBtn" disabled>讀取遊戲中...</button>
        </div>

        <div id="logBox" class="log-box"></div>
    </div>

    <script>
        let nesBuffer = null;
        let originalFileName = "game";
        let detectedMapper = -1;
        let isVerticalMirror = false;

        // ==================== [ 基礎數據範本定義 ] ====================
        
        // 1. UNROM (Mapper 2) 專用
        const unrom_header1_template = [
            0x00, 0x00, 0x83, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x02, 0x03, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 0x00, 0x00, 0x00, 0x04, 0x80, 0x10, 0x42, 0x45, 0x4E, 0x4E, 0x59, 0x00, 0x00, 0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 0x04
        ];
        const unrom_header2_4 = new Uint8Array([0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x00,0x80,0x00,0x00,0x00,0x04]);
        const unrom_header3 = new Uint8Array([0x00,0x00,0x82,0x01,0x2A,0x4E,0x49,0x4E,0x54,0x45,0x4E,0x44,0x4F,0x2D,0x48,0x56,0x43,0x2A,0xFF,0x42,0x45,0x4E,0x4E,0x59,0x01,0x01,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x02,0x02,0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x00,0x80,0x00,0x00,0x00,0x04]);
        const unrom_footer2_4 = new Uint8Array([0x00, 0x00]);

        // 2. NROM (Mapper 0) 專用模版 (與 FC1009.A 開頭 121B 完全對齊)
        const nrom_header1_template = [
            0x00, 0x00, 0x84, 0x01, 0x2A, 0x4E, 0x49, 0x4E, 0x54, 0x45, 0x4E, 0x44, 0x4F, 0x2D, 0x48, 0x56, 
            0x43, 0x2A, 0xFF, 0x42, 0x30, 0x30, 0x38, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 
            0x20, 0x20, 0x20, 0x25, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x25, 0x20, 0x20, 0x20, 0x20, 
            0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 0x02, 0x03, 0x00, 
            0x00, 0x03, 0x00, 0x00, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x08, 0x00, 
            0x00, 0x00, 0x00, 0x04, 0x80, 0xF0, 0x42, 0x30, 0x30, 0x38, 0x20, 0x20, 0x20, 0x20, 0x20, 0x20, 
            0x20, 0x43, 0x41, 0x52, 0x44, 0x47, 0x41, 0x4D, 0x45, 0xFF, 0x4F, 0x00, 0x80, 0x00, 0x00, 0x00, 
            0x04
        ];
        // 102.1 中頭 (21B)
        const nrom_header2 = new Uint8Array([0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x00,0x80,0x00,0x00,0x00,0x04]);
        // 103.1 尾頭 (24B)
        const nrom_header3 = new Uint8Array([0x00,0x00,0x03,0x00,0x00,0x43,0x41,0x52,0x44,0x47,0x41,0x4D,0x45,0xFF,0x4F,0x01,0x00,0x00,0x00,0x00,0x04,0x00,0x00,0x00]);

        function log(message) {
            const logBox = document.getElementById('logBox');
            logBox.style.display = 'block';
            logBox.innerHTML += message + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.body.classList.remove('success-bg'); 
            originalFileName = file.name.replace(/\.nes$/i, '');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                nesBuffer = event.target.result;
                const nesData = new Uint8Array(nesBuffer);
                
                document.getElementById('fileInfo').style.display = 'block';
                document.getElementById('fileInfo').innerHTML = `<strong>已載入原始檔：</strong> ${file.name} (${file.size} Bytes)`;
                document.getElementById('logBox').innerHTML = '';
                log("--- 開始智能識別 iNES Header 規格 ---");

                const prgSize = nesData[4] * 16;
                const chrSize = nesData[5] * 8;
                const mapperLow = nesData[6] >> 4;
                const mapperHigh = nesData[7] & 0xF0;
                detectedMapper = mapperHigh | mapperLow;
                
                isVerticalMirror = (nesData[6] & 0x01) === 1;
                const mirroringType = isVerticalMirror ? "Vertical (垂直)" : "Horizontal (水平)";

                document.getElementById('vMapper').innerText = `${detectedMapper}`;
                document.getElementById('vMirror').innerText = mirroringType;
                document.getElementById('vPrg').innerText = `${prgSize} KB`;
                document.getElementById('vChr').innerText = `${chrSize} KB`;
                document.getElementById('infoPanel').style.display = 'block';

                const badge = document.getElementById('alertBadge');
                badge.style.display = 'block';
                badge.className = 'alert-badge';
                const convertBtn = document.getElementById('convertBtn');

                if (detectedMapper === 2 && prgSize === 128) {
                    document.getElementById('vMapper').innerText += " (UNROM)";
                    badge.classList.add('badge-success');
                    badge.innerHTML = `✅ 識別成功：符合 <b>UNROM 128KB</b> 規格。系統將輸出 <b>.A / .B 雙片包</b>！`;
                    convertBtn.innerText = "執行 UNROM 雙檔轉換";
                    convertBtn.disabled = false;
                } 
                else if (detectedMapper === 0 && prgSize === 16 && chrSize === 8) {
                    document.getElementById('vMapper').innerText += " (NROM)";
                    badge.classList.add('badge-success');
                    badge.innerHTML = `✅ 識別成功：符合 <b>NROM 25KB</b> 規格。將完美生成與原版一模一樣的 <b>單一 .A 檔案</b>！`;
                    convertBtn.innerText = "執行 NROM 精準單 .A 檔轉換";
                    convertBtn.disabled = false;
                } 
                else {
                    badge.classList.add('badge-warning');
                    badge.innerHTML = `⚠️ 不支援的格式 (Mapper: ${detectedMapper}, PRG: ${prgSize}KB, CHR: ${chrSize}KB)。`;
                    convertBtn.innerText = "規格不符，拒絕轉換";
                    convertBtn.disabled = true;
                }
            };
            reader.readAsArrayBuffer(file);
        });

        document.getElementById('convertBtn').addEventListener('click', function() {
            if (!nesBuffer) return;

            const nesData = new Uint8Array(nesBuffer);
            const rawData = nesData.subarray(16); 
            const zip = new JSZip();

            if (detectedMapper === 2) {
                // ==================== 【UNROM 分支】 ====================
                log("[執行] 啟動 UNROM 雙檔程序...");
                const chunkSize = 0x8000;
                let rawChunks = [];
                for (let i = 0; i < 4; i++) {
                    let startPos = i * chunkSize;
                    let chunk = new Uint8Array(chunkSize);
                    if (startPos < rawData.length) {
                        chunk.set(rawData.subarray(startPos, Math.min(startPos + chunkSize, rawData.length)));
                    }
                    rawChunks.push(chunk);
                }

                let dynamicHeader1 = new Uint8Array(unrom_header1_template);
                if (isVerticalMirror) { dynamicHeader1[85] = 0x00; }
                else { dynamicHeader1[85] = 0x10; }

                let b101_1 = new Uint8Array(dynamicHeader1.length + rawChunks[0].length);
                b101_1.set(dynamicHeader1, 0); b101_1.set(rawChunks[0], dynamicHeader1.length);

                let b102_1 = new Uint8Array(unrom_header2_4.length + rawChunks[1].length + unrom_footer2_4.length);
                b102_1.set(unrom_header2_4, 0); b102_1.set(rawChunks[1], unrom_header2_4.length); b102_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[1].length);

                let b103_1 = new Uint8Array(unrom_header3.length + rawChunks[2].length);
                b103_1.set(unrom_header3, 0); b103_1.set(rawChunks[2], unrom_header3.length);

                let b104_1 = new Uint8Array(unrom_header2_4.length + rawChunks[3].length + unrom_footer2_4.length);
                b104_1.set(unrom_header2_4, 0); b104_1.set(rawChunks[3], unrom_header2_4.length); b104_1.set(unrom_footer2_4, unrom_header2_4.length + rawChunks[3].length);

                const fileA_Data = new Uint8Array(b101_1.length + b102_1.length);
                fileA_Data.set(b101_1, 0); fileA_Data.set(b102_1, b101_1.length);
                
                const fileB_Data = new Uint8Array(b103_1.length + b104_1.length);
                fileB_Data.set(b103_1, 0); fileB_Data.set(b104_1, b103_1.length);

                zip.file(`${originalFileName}.A`, fileA_Data);
                zip.file(`${originalFileName}.B`, fileB_Data);
                log("[打包] UNROM .A/.B 導出完畢。");

            } 
            else if (detectedMapper === 0) {
                // ==================== 【NROM 完美修正分支】 ====================
                log("[執行] 啟動 NROM 精準位元對齊程序...");
                
                const prgSize = 0x4000; // 16KB 原始 PRG
                const chrSize = 0x2000; // 8KB 原始 CHR
                
                let rawPrg = new Uint8Array(prgSize);
                let rawChr = new Uint8Array(chrSize);
                
                if (rawData.length >= 0) rawPrg.set(rawData.subarray(0, Math.min(prgSize, rawData.length)));
                if (rawData.length >= prgSize) rawChr.set(rawData.subarray(prgSize, Math.min(prgSize + chrSize, rawData.length)));

                // 修正 NROM 鏡像：Horizontal = F0, Vertical = E0
                let dynamicHeader1 = new Uint8Array(nrom_header1_template);
                if (isVerticalMirror) {
                    dynamicHeader1[85] = 0xE0;
                    log("[鏡像] 偵測到垂直鏡像，特徵碼修正為 E0");
                } else {
                    dynamicHeader1[85] = 0xF0;
                    log("[鏡像] 偵測到水平鏡像，特徵碼修正為 F0");
                }

                // 精準計算全新一體化二進制空間 (總長度必須為 24792)
                // 結構：[121B大頭] + [16KB PRG] + [21B中頭] + [16KB 複製PRG] + [24B尾頭] + [8KB CHR]
                const totalSize = dynamicHeader1.length + prgSize + nrom_header2.length + prgSize + nrom_header3.length + chrSize;
                const finalA_Data = new Uint8Array(totalSize);
                
                let offset = 0;
                
                // 1. 寫入 121B 大頭 + 原始 PRG (101.1)
                finalA_Data.set(dynamicHeader1, offset); offset += dynamicHeader1.length;
                finalA_Data.set(rawPrg, offset); offset += prgSize;
                
                // 2. 寫入 21B 中頭 + 複製的 PRG (102.1)
                finalA_Data.set(nrom_header2, offset); offset += nrom_header2.length;
                finalA_Data.set(rawPrg, offset); offset += prgSize;
                
                // 3. 寫入 24B 尾頭 + 原始 CHR (103.1)
                finalA_Data.set(nrom_header3, offset); offset += nrom_header3.length;
                finalA_Data.set(rawChr, offset);

                zip.file(`${originalFileName}.A`, finalA_Data);
                log(`[校正] 結構拼接成功！總長度：${totalSize} Bytes (完美對齊 FC1009 原版規格)`);
            }

            const suffix = (detectedMapper === 2) ? "UNROM" : "NROM";
            zip.generateAsync({ type: "blob" }).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `${originalFileName}_${suffix}.zip`;
                link.click();
                
                log(`<span style='color:#ffffff;'><b>🎉 轉換完成！[ ${originalFileName}_${suffix}.zip ] 已完美匯出！</b></span>`);
                document.body.classList.add('success-bg'); // 變更成螢光綠背景
            });
        });

        // 拖曳控制
        const dropBox = document.querySelector('.upload-box');
        ['dragenter', 'dragover'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#00ff33'; }));
        ['dragleave', 'drop'].forEach(eName => dropBox.addEventListener(eName, (e) => { e.preventDefault(); dropBox.style.borderColor = '#555555'; }));
        dropBox.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if(files.length > 0) {
                document.getElementById('fileInput').files = files;
                document.getElementById('fileInput').dispatchEvent(new Event('change'));
            }
        });
    </script>
</body>
</html>
